# ▒█▀▄▒██▀░▄▀▀░▄▀▄▒█▀▄░█▀▄░█░█▄░█░▄▀▒
# ░█▀▄░█▄▄░▀▄▄░▀▄▀░█▀▄▒█▄▀░█░█▒▀█░▀▄█

#imported and not useful rn

#bind=SUPER,v,exec,kooha
#bind=SUPER,v,exec,wf-recorder -g "$(slurp)" --audio=alsa_output.pci-0000_08_00.6.analog-stereo.monitor -f ~/Videos/mov-$(date +"%Y-%m-%d--%H-%M-%S.mp4")
